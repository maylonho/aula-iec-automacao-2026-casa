name: Continuous Integration with Github Actions

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build Application JAR
        run: mvn clean package

      - name: Run test
        run: mvn test

      - name: Login to Docker Hub
        uses: docker/login-action@v2.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker Compose Build
        run: docker compose build

      - name: Push to Docker Hub Container Registry
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/aula_iec_automacao:latest ${{ secrets.DOCKER_USERNAME }}/aula_iec_automacao:${{ github.run_id }}

          docker push ${{ secrets.DOCKER_USERNAME }}/aula_iec_automacao:${{ github.run_id }}
          docker push ${{ secrets.DOCKER_USERNAME }}/aula_iec_automacao:latest
